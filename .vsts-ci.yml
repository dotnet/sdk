# Pipeline: https://dev.azure.com/dnceng/internal/_build?definitionId=286

trigger:
  batch: true
  branches:
    include:
    - main
    - release/11.0.1*
    - internal/release/*
    - exp/*

schedules:
- cron: '0 0 * * 0'
  displayName: Weekly CodeQL/SDL build
  branches:
    include:
    - main
  always: true

pr:
  branches:
    include:
    - main
    - release/*
    - internal/release/*

parameters:
# When true, runs the pipeline in the same way as the PR pipeline.
- name: runTestBuild
  displayName: Run A Test Build
  type: boolean
  default: false
- name: enableArm64Job
  displayName: Enables the ARM64 job
  type: boolean
  default: false

variables:
- template: /eng/pipelines/templates/variables/sdk-defaults.yml
# Variables used: DncEngInternalBuildPool
- template: /eng/common/templates-official/variables/pool-providers.yml
# Helix testing requires a token when internally run.
# Variables used: HelixApiAccessToken
- group: DotNet-HelixApi-Access
- group: AzureDevOps-Artifact-Feeds-Pats
# Allows Arcade to run a signed build by disabling post-build signing for release-branch builds or manual builds that are not running tests.
- ${{ if and(eq(parameters.runTestBuild, false), or(startswith(variables['Build.SourceBranch'], 'refs/heads/release/'), startswith(variables['Build.SourceBranch'], 'refs/heads/internal/release/'), eq(variables['Build.Reason'], 'Manual'))) }}:
  - name: PostBuildSign
    value: false
# Provides TSA variables for automatic bug reporting.
- ${{ if ne(variables['Build.Reason'], 'PullRequest') }}:
  - group: DotNet-CLI-SDLValidation-Params
### LOCAL ONLY ###
- name: _publishArgument
  value: -publish
- name: _signArgument
  value: -sign
- name: _officialBuildProperties
  # The OfficialBuilder property is set to Microsoft for the official build only.
  # This property is checked in Directory.Build.props and adds the MICROSOFT_ENABLE_TELEMETRY constant.
  # This constant is used in CompileOptions.cs to set both TelemetryOptOutDefault and TelemetryOptOutDefaultString.
  value: /p:DotNetPublishUsingPipelines=true /p:OfficialBuilder=Microsoft /p:OfficialBuildId=$(Build.BuildNumber)

resources:
  repositories:
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  ${{ if ne(variables['Build.Reason'], 'PullRequest') }}:
    template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  ${{ else }}:
    template: v1/1ES.Unofficial.PipelineTemplate.yml@1esPipelines
  parameters:
    containers:
      azureLinux30Amd64:
        image: mcr.microsoft.com/dotnet-buildtools/prereqs:azurelinux-3.0-net11.0-build-amd64
      # Cross-compilation prereq image (clang + /crossrootfs/arm64 sysroot) used by the Linux arm64
      # AoT leg. NativeAOT cross-links dotnet-aot for linux-arm64 from an x64 host; the container
      # provides the native toolchain + sysroot and sets ROOTFS_DIR, and the leg passes
      # /p:CrossBuild=true so ILC emits --sysroot/--target.
      azureLinuxCrossArm64:
        image: mcr.microsoft.com/dotnet-buildtools/prereqs:azurelinux-3.0-net11.0-cross-arm64
        env:
          ROOTFS_DIR: /crossrootfs/arm64

    sdl:
      sourceAnalysisPool:
        name: $(DncEngInternalBuildPool)
        image: 1es-windows-2022
        os: windows
      policheck:
        enabled: true
      tsa:
        enabled: true
      binskim:
        enabled: true
      ${{ if or(eq(parameters.runTestBuild, true), eq(variables['Build.Reason'], 'PullRequest')) }}:
        componentgovernance:
          # Refdoc: https://docs.opensource.microsoft.com/tools/cg/component-detection/variables/
          ignoreDirectories: artifacts, .packages

    stages:
    ############### BUILD STAGE ###############
    - stage: build
      displayName: Build
      jobs:
      ############### HELIX JOB MONITOR ###############
      - ${{ if or(eq(parameters.runTestBuild, true), eq(variables['Build.Reason'], 'PullRequest')) }}:
        - template: /eng/common/core-templates/job/helix-job-monitor.yml@self
          parameters:
            helixAccessToken: $(HelixApiAccessToken)

      ############### WINDOWS ###############
      - template: /eng/pipelines/templates/jobs/sdk-job-matrix.yml@self
        parameters:
          pool:
            name: $(DncEngInternalBuildPool)
            image: windows.vs2022.amd64
            os: windows
          helixTargetQueue: windows.amd64.vs2026.pre.scout
          oneESCompat:
            templateFolderName: templates-official
            publishTaskPrefix: 1ES.
          populateInternalRuntimeVariables: true
          runtimeSourceProperties: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)
          locBranch: release/10.0.3xx
          # WORKAROUND: BinSkim requires the folder exist prior to scanning.
          preSteps:
          - powershell: New-Item -ItemType Directory -Path $(Build.SourcesDirectory)/artifacts/bin -Force
            displayName: Create artifacts/bin directory
          ${{ if and(eq(parameters.runTestBuild, false), ne(variables['Build.Reason'], 'PullRequest'), ne(variables['Build.Reason'], 'BatchedCI')) }}:
            timeoutInMinutes: 180
            windowsJobParameterSets:
            ### OFFICIAL ###
            - categoryName: Official
              publishArgument: $(_publishArgument)
              signArgument: $(_signArgument)
              officialBuildProperties: $(_officialBuildProperties) /p:BuildWorkloads=true
              enableDefaultArtifacts: true
              runTests: false
              publishRetryConfig: true
              variables:
                _SignType: real
            - categoryName: Official
              targetArchitecture: x86
              publishArgument: $(_publishArgument)
              signArgument: $(_signArgument)
              officialBuildProperties: $(_officialBuildProperties)
              runTests: false
              variables:
                _SignType: real
              dependsOn: Official_windows_x64
              downloadManifestMsiPackages: true
            - categoryName: Official
              targetArchitecture: arm64
              publishArgument: $(_publishArgument)
              signArgument: $(_signArgument)
              officialBuildProperties: $(_officialBuildProperties)
              runTests: false
              variables:
                _SignType: real
              dependsOn: Official_windows_x64
              downloadManifestMsiPackages: true
            ### TestTemplatesCG ###
            # Note: This job is only used to allow the test templates to be built locally on the agent as opposed to Helix.
            # The tests acquire the templates' PackageReferences from NuGet, which allows them to be scanned by CG (component governance).
            # CG is only ran internally, so this job makes sense to only run alongside of the official jobs.
            - categoryName: TestTemplatesCG
              testProjects: $(Build.SourcesDirectory)/test/dotnet-new.IntegrationTests/dotnet-new.IntegrationTests.csproj
              testRunnerAdditionalArguments: -class Microsoft.DotNet.Cli.New.IntegrationTests.DotnetNewTestTemplatesTests
              publishXunitResults: true

      ### AOT (win-arm64 cross-build) ###
      # dotnet-aot is built with NativeAOT, which can cross-compile win-x64 -> win-arm64 (the MSVC
      # arm64 linker and the RID-specific ILCompiler package handle the cross-link; no sysroot is
      # required). This leg therefore BUILDS on the existing win-x64 pool with /p:CrossBuild=true and
      # produces the dotnet-aot .dll plus its mstat/dgml size-analysis artifacts (that step is gated
      # on runAoTTests). It is build-only (runTests: false): there is no wired windows arm64 Helix
      # queue yet, so running the *.AoT.Tests on arm64 hardware is a follow-up pending a
      # windows.11.arm64 queue. Runs for internal PRs and test builds.
      - ${{ if or(eq(parameters.runTestBuild, true), eq(variables['Build.Reason'], 'PullRequest')) }}:
        - template: /eng/pipelines/templates/jobs/sdk-job-matrix.yml@self
          parameters:
            pool:
              name: $(DncEngInternalBuildPool)
              image: windows.vs2022.amd64
              os: windows
            helixTargetQueue: windows.amd64.vs2026.pre.scout
            oneESCompat:
              templateFolderName: templates-official
              publishTaskPrefix: 1ES.
            populateInternalRuntimeVariables: true
            runtimeSourceProperties: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)
            windowsJobParameterSets:
            - categoryName: AoT
              runAoTTests: true
              targetArchitecture: arm64
              runtimeIdentifier: win-arm64
              osProperties: /p:CrossBuild=true
              runTests: false

      ############### LINUX ###############
      - template: /eng/pipelines/templates/jobs/sdk-job-matrix.yml@self
        parameters:
          pool:
            name: $(DncEngInternalBuildPool)
            image: build.azurelinux.3.amd64
            os: linux
          helixTargetQueue: ubuntu.2204.amd64
          oneESCompat:
            templateFolderName: templates-official
            publishTaskPrefix: 1ES.
          populateInternalRuntimeVariables: true
          runtimeSourceProperties: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)
          ${{ if and(eq(parameters.runTestBuild, false), ne(variables['Build.Reason'], 'PullRequest'), ne(variables['Build.Reason'], 'BatchedCI')) }}:
            timeoutInMinutes: 90
            linuxJobParameterSets:
            ### OFFICIAL ###
            # Note: These builds are also glibc like the glibc category, but that category uses containers, and doesn't publish zips and tarballs.
            - categoryName: Official
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties)
              osProperties: $(linuxOsglibcProperties)
              runTests: false
            - categoryName: Official
              targetArchitecture: arm
              runtimeIdentifier: linux-arm
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties)
              osProperties: $(linuxOsglibcProperties)
              runTests: false
            - categoryName: Official
              targetArchitecture: arm64
              runtimeIdentifier: linux-arm64
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties)
              osProperties: $(linuxOsglibcProperties)
              runTests: false
            ### glibc ###
            - categoryName: glibc
              # Do not publish zips and tarballs. The linux-x64 binaries are already published by Official.
              publishArgument: $(_publishArgument) /p:PublishBinariesAndBadge=false
              officialBuildProperties: $(_officialBuildProperties)
              osProperties: $(linuxOsglibcProperties) /p:BuildSdkDeb=true /p:BuildSdkRpm=true
              runTests: false
            - categoryName: glibc
              targetArchitecture: arm64
              runtimeIdentifier: linux-arm64
              # Do not publish zips and tarballs. The linux-arm64 binaries are already published by Official.
              publishArgument: $(_publishArgument) /p:PublishBinariesAndBadge=false
              officialBuildProperties: $(_officialBuildProperties)
              osProperties: $(linuxOsglibcProperties) /p:BuildSdkDeb=true /p:BuildSdkRpm=true
              runTests: false
            ### musl ###
            - categoryName: musl
              container: azureLinux30Amd64
              runtimeIdentifier: linux-musl-x64
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties)
              # Use HostOS when running on alpine.
              osProperties: /p:HostOS=linux-musl
              # SBOM generation is not supported for alpine.
              enableSbom: false
              runTests: false
              # Helix is hanging on this job using the container. See: https://github.com/dotnet/dnceng/issues/6000
              disableJob: true
            - categoryName: musl
              container: azureLinux30Amd64
              targetArchitecture: arm
              runtimeIdentifier: linux-musl-arm
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties)
              osProperties: /p:OSName=linux-musl
              runTests: false
              # Helix is hanging on this job using the container. See: https://github.com/dotnet/dnceng/issues/6000
              disableJob: true
            - categoryName: musl
              targetArchitecture: arm64
              runtimeIdentifier: linux-musl-arm64
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties)
              osProperties: /p:OSName=linux-musl
              runTests: false

      ### AOT (linux-arm64 cross-build) ###
      # dotnet-aot is built with NativeAOT, which can cross-compile for linux-arm64 from an x64 host
      # given a cross toolchain and target sysroot. This leg therefore runs on the regular x64 Linux
      # pool inside the azurelinux cross-arm64 prereq container (which provides clang + the
      # /crossrootfs/arm64 sysroot and sets ROOTFS_DIR) and passes /p:CrossBuild=true. Consistent
      # with the other linux-arm64 legs, this only performs the build (the x64 AoT leg provides the
      # running test coverage). Runs for internal PRs and test builds; official builds publish via
      # the Official legs above and don't need it.
      - ${{ if or(eq(parameters.runTestBuild, true), eq(variables['Build.Reason'], 'PullRequest')) }}:
        - template: /eng/pipelines/templates/jobs/sdk-job-matrix.yml@self
          parameters:
            pool:
              name: $(DncEngInternalBuildPool)
              image: build.azurelinux.3.amd64
              os: linux
            helixTargetQueue: ubuntu.2204.amd64
            oneESCompat:
              templateFolderName: templates-official
              publishTaskPrefix: 1ES.
            populateInternalRuntimeVariables: true
            runtimeSourceProperties: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)
            timeoutInMinutes: 90
            linuxJobParameterSets:
            - categoryName: AoT
              container: azureLinuxCrossArm64
              runAoTTests: true
              targetArchitecture: arm64
              runtimeIdentifier: linux-arm64
              osProperties: $(linuxOsglibcProperties) /p:CrossBuild=true
              runTests: false

      ############### MACOS ###############
      - template: /eng/pipelines/templates/jobs/sdk-job-matrix.yml@self
        parameters:
          pool:
            name: Azure Pipelines
            image: macOS-latest
            os: macOS
          helixTargetQueue: osx.15.arm64
          oneESCompat:
            templateFolderName: templates-official
            publishTaskPrefix: 1ES.
          populateInternalRuntimeVariables: true
          runtimeSourceProperties: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)
          ${{ if and(eq(parameters.runTestBuild, false), ne(variables['Build.Reason'], 'PullRequest'), ne(variables['Build.Reason'], 'BatchedCI')) }}:
            macOSJobParameterSets:
            ### OFFICIAL ###
            - categoryName: Official
              runtimeIdentifier: osx-x64
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties)
              runTests: false
            - categoryName: Official
              targetArchitecture: arm64
              runtimeIdentifier: osx-arm64
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties)
              runTests: false
      ### AOT (osx-arm64 cross-build) ###
      # dotnet-aot is built with NativeAOT, which can cross-compile osx-x64 -> osx-arm64 (clang/link
      # on macOS are multi-target and need no extra sysroot). This leg therefore BUILDS on the x64
      # macOS pool (the Official osx-arm64 leg already cross-builds on macOS-latest/x64) with
      # /p:CrossBuild=true. Because AoT tests are dispatched to Helix (runTests passes
      # -test /p:CustomHelixTargetQueue=...), the *.AoT.Tests still execute on the osx.15.arm64
      # Helix queue, so there is no macOS AoT test-coverage loss. Runs for internal PRs and test
      # builds; official builds publish via the Official legs above and don't need it.
      - ${{ if or(eq(parameters.runTestBuild, true), eq(variables['Build.Reason'], 'PullRequest')) }}:
        - template: /eng/pipelines/templates/jobs/sdk-job-matrix.yml@self
          parameters:
            pool:
              name: Azure Pipelines
              vmImage: macOS-latest
              os: macOS
            helixTargetQueue: osx.15.arm64
            oneESCompat:
              templateFolderName: templates-official
              publishTaskPrefix: 1ES.
            populateInternalRuntimeVariables: true
            runtimeSourceProperties: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)
            macOSJobParameterSets:
            - categoryName: AoT
              runAoTTests: true
              targetArchitecture: arm64
              runtimeIdentifier: osx-arm64
              osProperties: /p:CrossBuild=true
      ### ARM64 TESTBUILD ###
      - ${{ if and(or(eq(parameters.runTestBuild, true), eq(variables['Build.Reason'], 'PullRequest')), eq(parameters.enableArm64Job, true)) }}:
        - template: /eng/pipelines/templates/jobs/sdk-job-matrix.yml@self
          parameters:
            pool:
              name: Azure Pipelines
              vmImage: macOS-latest
              os: macOS
            helixTargetQueue: osx.15.arm64
            populateInternalRuntimeVariables: true
            runtimeSourceProperties: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)
            macOSJobParameterSets:
            - categoryName: TestBuild
              targetArchitecture: arm64
              runtimeIdentifier: osx-arm64

      ############### DOTNET-FORMAT ###############
      - ${{ if or(eq(parameters.runTestBuild, true), eq(variables['Build.Reason'], 'PullRequest')) }}:
        - template: /eng/dotnet-format/dotnet-format-integration.yml@self
          parameters:
            oneESCompat:
              templateFolderName: templates-official
              publishTaskPrefix: 1ES.
            populateInternalRuntimeVariables: true
            runtimeSourceProperties: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)

    ############### PUBLISH STAGE ###############
    - ${{ if ne(variables['Build.Reason'], 'PullRequest') }}:
      - stage: publish
        displayName: Publish
        dependsOn: []
        jobs:
        - template: /eng/common/templates-official/job/publish-build-assets.yml@self
          parameters:
            publishUsingPipelines: true
            publishAssetsImmediately: true
            isAssetlessBuild: true
            repositoryAlias: self
            pool:
              name: $(DncEngInternalBuildPool)
              image: 1es-windows-2022
              os: windows
