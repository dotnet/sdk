parameters:
  ### GENERAL ###
  variables: {}
  dependsOn: ''
  oneESCompat:
    templateFolderName: templates
    publishTaskPrefix: ''
  container: ''
  helixTargetContainer: ''
  categoryName: Build
  runTests: true
  testProjects: $(Build.SourcesDirectory)/test/UnitTests.proj
  publishRetryConfig: false
  publishXunitResults: false
  testRunnerAdditionalArguments: ''
  enableSbom: true
  populateInternalRuntimeVariables: false
  timeoutInMinutes: ''
  ### ENV VARS ###
  testFullMSBuild: false
  runAoTTests: false
  # Runs the NativeAOT CLI tests (test/dotnet-aot.Tests) on the build agent after the build.
  # These publish the test assembly as a NativeAOT binary and run it on the same architecture,
  # validating the AOT CLI entry-point code under NativeAOT compilation. This is distinct from
  # runAoTTests, which runs the Blazor WebAssembly AoT tests on Helix.
  runNativeAotCliTests: false
  ### MSBUILD ###
  targetArchitecture: x64
  publishArgument: ''
  signArgument: ''
  pgoInstrument: false
  enableDefaultArtifacts: false
  runtimeIdentifier: linux-x64
  osProperties: ''
  runtimeSourceProperties: ''
  officialBuildProperties: ''
  downloadManifestMsiPackages: false
  ### ARCADE ###
  preSteps: []

jobs:
- template: /eng/common/${{ parameters.oneESCompat.templateFolderName }}/job/job.yml
  parameters:
    ${{ if eq(parameters.container, '') }}:
      name: ${{ parameters.categoryName }}_${{ parameters.pool.os }}_${{ parameters.targetArchitecture }}
      displayName: '${{ parameters.categoryName }}: ${{ parameters.pool.os }} (${{ parameters.targetArchitecture }})'
    ${{ else }}:
      name: ${{ parameters.categoryName }}_${{ parameters.pool.os }}_${{ parameters.targetArchitecture }}_${{ parameters.container }}
      displayName: '${{ parameters.categoryName }}: ${{ parameters.pool.os }} (${{ parameters.targetArchitecture }}) [${{ parameters.container }}]'
    pool: ${{ parameters.pool }}
    container: ${{ parameters.container }}
    strategy: ${{ parameters.strategy }}
    helixRepo: dotnet/sdk
    ${{ if ne(parameters.timeoutInMinutes, '') }}:
      timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
    ${{ elseif eq(parameters.pool.os, 'macOS') }}:
      timeoutInMinutes: 90
    ${{ else }}:
      timeoutInMinutes: 60
    enableMicrobuild: true
    enablePublishBuildAssets: true
    enableTelemetry: true
    enablePublishUsingPipelines: true
    enableSbom: ${{ parameters.enableSbom }}
    variables:
    - ${{ insert }}: ${{ parameters.variables }}
    dependsOn: ${{ parameters.dependsOn }}
    preSteps: ${{ parameters.preSteps }}
    templateContext:
      sdl:
        binskim:
          analyzeTargetGlob: +:f|eng\**\*.props;+:f|artifacts\bin\**\*.dll;+:f|artifacts\bin\**\*.exe;-:f|artifacts\bin\**\msdia140.dll;-:f|artifacts\bin\**\pgort140.dll;-:f|artifacts\bin\*Tests\**;-:f|**\Microsoft.NET.Runtime.Emscripten**\tools\**;-:f|**\CodeCoverage\**;-:f|artifacts\bin\**\capstone.dll;

    steps:
    ############## PREP ###############
    - ${{ if eq(parameters.publishRetryConfig, true) }}:
      # Publishes the build-configuration.json to the artifacts which Arcade uses to allow all the jobs in the pipeline to retry automatically.
      # See: https://github.com/dotnet/arcade/blob/main/Documentation/Projects/Build%20Analysis/BuildRetryOnboard.md
      - task: ${{ parameters.oneESCompat.publishTaskPrefix }}PublishPipelineArtifact@1
        displayName: 🟣 Publish build-configuration.json
        inputs:
          targetPath: $(Build.SourcesDirectory)/eng/BuildConfiguration
          artifactName: BuildConfiguration

    - ${{ if eq(parameters.populateInternalRuntimeVariables, true) }}:
      - template: /eng/common/${{ parameters.oneESCompat.templateFolderName }}/steps/enable-internal-sources.yml
        parameters:
          legacyCredential: $(dn-bot-dnceng-artifact-feeds-rw)
      - template: /eng/common/${{ parameters.oneESCompat.templateFolderName }}/steps/enable-internal-runtimes.yml

    - ${{ if eq(parameters.downloadManifestMsiPackages, true) }}:
      - task: DownloadBuildArtifacts@1
        inputs:
          artifactName: PackageArtifacts
          downloadPath: $(Build.SourcesDirectory)/artifacts/downloaded-manifest-msi-packages
          itemPattern: '**/*Manifest-*.Msi.*.nupkg'
          checkDownloadedFiles: true
        displayName: 🟣 Download Manifest MSI Packages

    ############### BUILDING ###############
    - ${{ if eq(parameters.pool.os, 'windows') }}:
      - powershell: eng/common/build.ps1
          -restore -build -pack -ci -nativeToolsOnMachine
          -configuration $(buildConfiguration)
          ${{ parameters.publishArgument }}
          ${{ parameters.signArgument }}
          /p:EnableDefaultArtifacts=${{ parameters.enableDefaultArtifacts }}
          /p:TargetArchitecture=${{ parameters.targetArchitecture }}
          /p:PgoInstrument=${{ parameters.pgoInstrument }}
          ${{ parameters.osProperties }}
          ${{ parameters.runtimeSourceProperties }}
          ${{ parameters.officialBuildProperties }}
          /p:DotNetSignType=$(_SignType) /p:TeamName=$(_TeamName)
        displayName: 🟣 Build
        env:
          BuildConfig: $(buildConfiguration)
          TestFullMSBuild: ${{ parameters.testFullMSBuild }}
          MSBUILDALWAYSRETRY: true

    - ${{ else }}:
      - script: |
          source $(Build.SourcesDirectory)/eng/common/native/init-os-and-arch.sh
          source $(Build.SourcesDirectory)/eng/common/native/init-distro-rid.sh
          initDistroRidGlobal "$os" "$arch" ""

          . $(Build.SourcesDirectory)/eng/common/build.sh \
          -restore -build -pack -ci \
          -configuration $(buildConfiguration) \
          ${{ parameters.publishArgument }} \
          ${{ parameters.signArgument }} \
          /p:EnableDefaultArtifacts=${{ parameters.enableDefaultArtifacts }} \
          /p:TargetArchitecture=${{ parameters.targetArchitecture }} \
          /p:PgoInstrument=${{ parameters.pgoInstrument }} \
          /p:TargetRid=${{ parameters.runtimeIdentifier }} \
          ${{ parameters.osProperties }} \
          ${{ parameters.runtimeSourceProperties }} \
          ${{ parameters.officialBuildProperties }} \
          /p:DotNetSignType=$(_SignType) /p:TeamName=$(_TeamName)
        displayName: 🟣 Build
        env:
          BuildConfig: $(buildConfiguration)
          OPENSSL_ENABLE_SHA1_SIGNATURES: 1
          MSBUILDALWAYSRETRY: true
          TARGET_ARCHITECTURE: ${{ parameters.targetArchitecture }}

    ############### TESTING ###############
    - ${{ if eq(parameters.runTests, true) }}:

      # For the /p:Projects syntax for PowerShell, see: https://github.com/dotnet/msbuild/issues/471#issuecomment-1146466335
      - ${{ if eq(parameters.pool.os, 'windows') }}:
        - powershell: eng/common/build.ps1
            -restore -test -ci -prepareMachine -nativeToolsOnMachine
            -configuration $(buildConfiguration)
            -binaryLogName ${{ parameters.categoryName }}Tests.binlog
            /p:Projects=\`"${{ replace(parameters.testProjects, ';', '`;') }}\`"
            /p:TestRunnerAdditionalArguments="${{ parameters.testRunnerAdditionalArguments }}"
            /p:TargetArchitecture=${{ parameters.targetArchitecture }}
            ${{ parameters.runtimeSourceProperties }}
            /p:CustomHelixTargetQueue=${{ parameters.helixTargetQueue }}
            /p:EnableHelixJobMonitor=true
          displayName: 🟣 Queue Tests
          env:
            # Required by Arcade for running in Helix.
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)
            HelixAccessToken: $(HelixApiAccessToken)
            RunAoTTests: ${{ parameters.runAoTTests }}
            TestFullMSBuild: ${{ parameters.testFullMSBuild }}

      - ${{ else }}:
        # For the /p:Projects syntax for Bash, see: https://github.com/dotnet/msbuild/issues/471#issuecomment-1690189034
        # The /p:CustomHelixTargetQueue syntax is: <queue-name>@<container-url>
        # For the Helix containers, see the 'simpleTags' arrays here: https://github.com/dotnet/versions/blob/main/build-info/docker/image-info.dotnet-dotnet-buildtools-prereqs-docker-main.json
        - script: eng/common/build.sh
            -restore -test -ci -prepareMachine
            -configuration $(buildConfiguration)
            --binaryLogName ${{ parameters.categoryName }}Tests.binlog
            '/p:Projects="${{ parameters.testProjects }}"'
            /p:TestRunnerAdditionalArguments="${{ parameters.testRunnerAdditionalArguments }}"
            /p:TargetArchitecture=${{ parameters.targetArchitecture }}
            /p:TargetRid=${{ parameters.runtimeIdentifier }}
            ${{ parameters.osProperties }}
            ${{ parameters.runtimeSourceProperties }}
            /p:CustomHelixTargetQueue=${{ parameters.helixTargetQueue }}${{ parameters.helixTargetContainer }}
            /p:EnableHelixJobMonitor=true
          displayName: 🟣 Queue Tests
          env:
            # Required by Arcade for running in Helix.
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)
            HelixAccessToken: $(HelixApiAccessToken)
            RunAoTTests: ${{ parameters.runAoTTests }}
            TARGET_ARCHITECTURE: ${{ parameters.targetArchitecture }}

    ############### NATIVE AOT CLI TESTS ###############
    # Publishes test/dotnet-aot.Tests as a NativeAOT binary and runs it on the build agent.
    # NativeAOT binaries must run on the same architecture they are built for, so the scripts
    # auto-detect the agent's host RID (via .dotnet/dotnet --info) rather than using the build's
    # target RID. On cross-architecture legs (e.g. the macOS leg cross-builds osx-arm64 on an
    # x64 host) this runs the tests for the host architecture. Runs after the Helix queue step
    # so it never prevents the broader Helix test submission.
    - ${{ if eq(parameters.runNativeAotCliTests, true) }}:
      - ${{ if eq(parameters.pool.os, 'windows') }}:
        - powershell: |
            test/dotnet-aot.Tests/run-aot-tests.ps1 `
              -Configuration $(buildConfiguration) `
              -Trx `
              -ResultsDirectory $(Build.SourcesDirectory)/artifacts/TestResults/$(buildConfiguration)
          displayName: 🟣 Run NativeAOT CLI Tests
      - ${{ else }}:
        - script: |
            chmod +x test/dotnet-aot.Tests/run-aot-tests.sh
            test/dotnet-aot.Tests/run-aot-tests.sh \
              --configuration $(buildConfiguration) \
              --trx \
              --results-directory $(Build.SourcesDirectory)/artifacts/TestResults/$(buildConfiguration)
          displayName: 🟣 Run NativeAOT CLI Tests
          # The CLI's --cli-schema rendering evaluates a shell-completion default that requires
          # SHELL to be set; the bare AzDO script task does not export it, so set it explicitly.
          env:
            SHELL: /bin/bash

      - task: PublishTestResults@2
        displayName: 🟣 Publish NativeAOT CLI Test Results
        inputs:
          testResultsFormat: VSTest
          testResultsFiles: artifacts/TestResults/$(buildConfiguration)/dotnet-aot.Tests.trx
          testRunTitle: NativeAOT CLI ($(System.PhaseName))
          buildPlatform: ${{ parameters.targetArchitecture }}
          buildConfiguration: $(buildConfiguration)
        continueOnError: true
        condition: always()

    ############### POST ###############
    - ${{ if eq(parameters.publishXunitResults, true) }}:
      # This is only necessary for non-Helix tests.
      - task: PublishTestResults@2
        displayName: 🟣 Publish xUnit Test Results
        inputs:
          testResultsFormat: xUnit
          testResultsFiles: artifacts/TestResults/$(buildConfiguration)/*.xml
          testRunTitle: $(System.PhaseName)
          buildPlatform: ${{ parameters.targetArchitecture }}
          buildConfiguration: $(buildConfiguration)
        continueOnError: true
        condition: always()

    - task: CopyFiles@2
      displayName: 🟣 Copy Logs
      inputs:
        SourceFolder: $(Build.SourcesDirectory)/artifacts
        ${{ if eq(parameters.runTests, false) }}:
          Contents: |
            log/$(buildConfiguration)/**/*
            TestResults/$(buildConfiguration)/**/*
            SymStore/$(buildConfiguration)/**/*
            tmp/$(buildConfiguration)/**/*.binlog
        ${{ else }}:
          Contents: |
            log/$(buildConfiguration)/**/*
            TestResults/$(buildConfiguration)/**/*
            tmp/$(buildConfiguration)/**/*.binlog
        TargetFolder: $(Build.ArtifactStagingDirectory)
      continueOnError: true
      condition: always()

    - task: ${{ parameters.oneESCompat.publishTaskPrefix }}PublishBuildArtifacts@1
      displayName: 🟣 Publish Logs
      inputs:
        PathtoPublish: $(Build.ArtifactStagingDirectory)
        # This is the job name, but because of "legacy reasons", both Agent.JobName and System.JobName are not the actual job name.
        # See: https://developercommunity.visualstudio.com/t/systemjobname-seems-to-be-incorrectly-assigned-and/1209736#TPIN-N1211828
        ArtifactName: $(System.PhaseName)_Logs_Attempt$(System.JobAttempt)
        publishLocation: Container
      continueOnError: true
      condition: always()

    # Only the AoT legs publish the dotnet-aot NativeAOT library, so only they produce
    # the size-analysis files. Gate these steps so they don't run (and upload empty
    # artifacts) on non-AoT legs like the TestBuild/FullFramework jobs.
    - ${{ if eq(parameters.runAoTTests, true) }}:
      - task: CopyFiles@2
        displayName: 🟣 Copy NativeAOT Size Analysis Files
        inputs:
          SourceFolder: $(Build.SourcesDirectory)/artifacts/obj/dotnet-aot
          # the three relevant files for size analysis are
          # 1. dotnet-aot.mstat - the main size analysis file
          # 2. dotnet-aot.codegen.dgml.xml - the code generation dependency graph
          # 3. dotnet-aot.scan.dgml.xml - the scan dependency graph
          # and each is going to be in the <config>/<tfm>/<rid>/native directory
          Contents: |
            $(buildConfiguration)/*/*/native/dotnet-aot.mstat
            $(buildConfiguration)/*/*/native/dotnet-aot.codegen.dgml.xml
            $(buildConfiguration)/*/*/native/dotnet-aot.scan.dgml.xml
          TargetFolder: $(Build.ArtifactStagingDirectory)/aot-size-analysis
          flattenFolders: true
        continueOnError: true
        condition: not(canceled())

      - task: ${{ parameters.oneESCompat.publishTaskPrefix }}PublishPipelineArtifact@1
        displayName: 🟣 Publish NativeAOT Size Analysis
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/aot-size-analysis
          artifactName: $(System.PhaseName)_AotSizeAnalysis
        continueOnError: true
        condition: not(canceled())

    - task: ${{ parameters.oneESCompat.publishTaskPrefix }}PublishPipelineArtifact@1
      displayName: 🟣 Publish Built Assets
      inputs:
        targetPath: $(Build.SourcesDirectory)/artifacts/packages/$(buildConfiguration)/Shipping
        artifactName: $(System.PhaseName)_Assets
      continueOnError: true
      condition: not(canceled())
