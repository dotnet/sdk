parameters:
  ### GENERAL ###
  variables: {}
  dependsOn: ''
  oneESCompat:
    templateFolderName: templates
    publishTaskPrefix: ''
  enableSbom: true
  timeoutInMinutes: 150
  ### PUBLISH ###
  # The RID to publish for (e.g. win-x64, linux-arm64, osx-x64, linux-musl-x64, etc.)
  rid: ''
  pool: {}
  container: ''
  preSteps: []

jobs:
- template: /eng/common/${{ parameters.oneESCompat.templateFolderName }}/job/job.yml
  parameters:
    displayName: '${{ parameters.pool.emoji }} dotnetup executable: ${{ parameters.rid }}'
    pool: ${{ parameters.pool }}
    container: ${{ parameters.container }}
    helixRepo: dotnet/sdk
    timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
    enableMicrobuild: true
    enableMicrobuildForMacAndLinux: ${{ startsWith(parameters.rid, 'osx') }}
    enablePublishBuildAssets: true
    enableTelemetry: true
    enablePublishUsingPipelines: true
    enableBuildRetry: true
    enableSbom: ${{ parameters.enableSbom }}
    variables:
    - ${{ insert }}: ${{ parameters.variables }}
    - name: _officialBuildProperties
      value: /p:OfficialBuilder=Microsoft /p:OfficialBuildId=$(Build.BuildNumber)
    dependsOn: ${{ parameters.dependsOn }}
    preSteps: ${{ parameters.preSteps }}
    templateContext:
      sdl:
        binskim:
          analyzeTargetGlob: +:f|artifacts\bin\**\*.dll;+:f|artifacts\bin\**\*.exe;-:f|artifacts\bin\*Tests\**;
      outputs:
      - output: pipelineArtifact
        displayName: '📦 Publish dotnetup ${{ parameters.rid }} executable'
        condition: always()
        targetPath: '$(Build.SourcesDirectory)/artifacts/publish/dotnetup/${{ parameters.rid }}/'
        artifactName: 'dotnetup-executable-${{ parameters.rid }}'
        publishLocation: Container
      - output: pipelineArtifact
        displayName: '📊 Publish dotnetup ${{ parameters.rid }} binlogs'
        condition: always()
        targetPath: '$(Build.SourcesDirectory)/artifacts/binlogs/'
        artifactName: 'dotnetup-executable-binlogs-${{ parameters.rid }}'
        publishLocation: Container
      - ${{ if startsWith(parameters.rid, 'osx') }}:
        - output: pipelineArtifact
          displayName: '🐞 Publish dotnetup ${{ parameters.rid }} debug symbols'
          condition: succeeded()
          targetPath: '$(Build.SourcesDirectory)/artifacts/publish/dotnetup-dsym/${{ parameters.rid }}/'
          artifactName: 'dotnetup-executable-dsym-${{ parameters.rid }}'
          publishLocation: Container
      - ${{ if or(startsWith(parameters.rid, 'osx'), startsWith(parameters.rid, 'win')) }}:
        - output: pipelineArtifact
          displayName: '🖋️ Publish dotnetup ${{ parameters.rid }} signing logs'
          condition: always()
          targetPath: '$(Build.SourcesDirectory)/artifacts/log/Sign/'
          artifactName: 'dotnetup-executable-sign-logs-${{ parameters.rid }}'
          publishLocation: Container
          sbomEnabled: false
      - output: pipelineArtifact
        displayName: '📦 Publish dotnetup ${{ parameters.rid }} standalone binary'
        condition: succeeded()
        targetPath: '$(Build.SourcesDirectory)/artifacts/publish/dotnetup-standalone/${{ parameters.rid }}/'
        artifactName: 'dotnetup-standalone-${{ parameters.rid }}'
        publishLocation: Container

    steps:
    # Use shallow checkout to save disk in space-constrained cross-build containers.
    - checkout: self
      fetchDepth: 1

    - template: /eng/pipelines/templates/steps/strip-global-json-runtimes.yml
      parameters:
        os: ${{ parameters.pool.os }}

    - ${{ if eq(parameters.pool.os, 'windows') }}:
      - powershell: |
          & .\restore.cmd -projects dotnetup.slnf $(_officialBuildProperties)
        displayName: 🍱 Bootstrap toolset (Windows)
        timeoutInMinutes: 10
        env:
          DOTNET_INSTALL_TEST_RUNTIMES: false
      - powershell: |
          New-Item -ItemType Directory -Path "$(Build.SourcesDirectory)/artifacts/publish/dotnetup/${{ parameters.rid }}" -Force
          & .\.dotnet\dotnet publish src\Installer\dotnetup\dotnetup.csproj -c Release -r ${{ parameters.rid }} --self-contained -p:EnforceCodeStyleInBuild=false -bl:$(Build.SourcesDirectory)/artifacts/binlogs/dotnetup-publish-${{ parameters.rid }}.binlog $(_officialBuildProperties)
        displayName: 🚀 Publish dotnetup (${{ parameters.rid }})
      - powershell: |
          $publishDir = Get-ChildItem -Path "$(Build.SourcesDirectory)\artifacts\bin\dotnetup\Release" -Directory | Select-Object -First 1
          $dotnetupPublishDir = "$($publishDir.FullName)\${{ parameters.rid }}\publish\"
          & .\.dotnet\dotnet build .\src\Installer\Installer.sign.proj /t:Sign "/p:DotnetupPublishDir=$dotnetupPublishDir" -bl:$(Build.SourcesDirectory)/artifacts/binlogs/dotnetup-sign-${{ parameters.rid }}.binlog $(_officialBuildProperties)
        displayName: 🖋️ Sign dotnetup executable (${{ parameters.rid }})
      - powershell: |
          $publishDir = Get-ChildItem -Path "$(Build.SourcesDirectory)\artifacts\bin\dotnetup\Release" -Directory | Select-Object -First 1
          $exe = "$($publishDir.FullName)\${{ parameters.rid }}\publish\dotnetup.exe"
          $sig = Get-AuthenticodeSignature "$exe"
          if ($sig.Status -ne 'Valid') { Write-Error "SignCheck failed for dotnetup.exe: $($sig.Status)"; exit 1 }
          Write-Host "✅ Signature verified for dotnetup.exe (Status: $($sig.Status), Signer: $($sig.SignerCertificate.Subject))"
        displayName: ✅ Verify dotnetup signature (${{ parameters.rid }})
      - powershell: |
          # Copy the published (and signed) output to the artifact staging directory
          $publishDir = Get-ChildItem -Path "$(Build.SourcesDirectory)\artifacts\bin\dotnetup\Release" -Directory | Select-Object -First 1
          Copy-Item -Path "$($publishDir.FullName)\${{ parameters.rid }}\publish\*" -Destination "$(Build.SourcesDirectory)\artifacts\publish\dotnetup\${{ parameters.rid }}\" -Recurse -Force
          # Copy just the binary to the standalone artifact staging directory
          New-Item -ItemType Directory -Path "$(Build.SourcesDirectory)\artifacts\publish\dotnetup-standalone\${{ parameters.rid }}" -Force | Out-Null
          Copy-Item -Path "$($publishDir.FullName)\${{ parameters.rid }}\publish\dotnetup.exe" -Destination "$(Build.SourcesDirectory)\artifacts\publish\dotnetup-standalone\${{ parameters.rid }}\"
        displayName: 📦 Stage dotnetup artifacts (${{ parameters.rid }})
      - powershell: |
          $standaloneDir = "$(Build.SourcesDirectory)\artifacts\publish\dotnetup-standalone\${{ parameters.rid }}"
          $exe = Join-Path $standaloneDir "dotnetup.exe"
          $hash = (Get-FileHash -Algorithm SHA512 $exe).Hash.ToLowerInvariant()
          Set-Content -Path "$exe.sha512" -Value $hash -NoNewline
          Write-Host "✅ SHA-512: $hash"
        displayName: 🔒 Generate SHA-512 checksum (${{ parameters.rid }})

    - ${{ if ne(parameters.pool.os, 'windows') }}:
      - script: |
          ./restore.sh -projects $(Build.SourcesDirectory)/src/Installer/dotnetup/dotnetup.csproj $(_officialBuildProperties)
        displayName: 🍱 Bootstrap toolset (Unix)
        timeoutInMinutes: 10
        retryCountOnTaskFailure: 2
        env:
          DOTNET_INSTALL_TEST_RUNTIMES: false
      - script: |
          # Free disk space in cross-build containers.
          # 1. Clear disposable NuGet HTTP cache (restored packages remain in global-packages).
          ./.dotnet/dotnet nuget locals http-cache --clear 2>/dev/null || true
          # 2. Delete source trees not needed for the dotnetup publish.
          rm -rf test/ template_feed/ documentation/ benchmarks/ .github/ .claude/
          echo "Disk usage after cleanup:"
          df -h / || true
        displayName: 🧹 Free disk space
        retryCountOnTaskFailure: 2
      - script: |
          mkdir -p "$(Build.SourcesDirectory)/artifacts/publish/dotnetup/${{ parameters.rid }}"
          CROSS_ARGS=""
          if [ -n "$ROOTFS_DIR" ]; then
            CROSS_ARGS="-p:SysRoot=$ROOTFS_DIR -p:LinkerFlavor=lld"
          fi
          ./.dotnet/dotnet publish src/Installer/dotnetup/dotnetup.csproj -c Release -r ${{ parameters.rid }} --self-contained $CROSS_ARGS -p:EnforceCodeStyleInBuild=false -bl:$(Build.SourcesDirectory)/artifacts/binlogs/dotnetup-publish-${{ parameters.rid }}.binlog $(_officialBuildProperties)
        displayName: 🚀 Publish dotnetup (${{ parameters.rid }})
        retryCountOnTaskFailure: 2

    # Sign macOS binaries with MacDeveloperHarden (requires MicroBuild for Mac)
    - ${{ if startsWith(parameters.rid, 'osx') }}:
      - script: |
          PUBLISH_DIR=$(find "$(Build.SourcesDirectory)/artifacts/bin/dotnetup/Release" -mindepth 1 -maxdepth 1 -type d | head -1)
          # NativeAOT publish produces a dotnetup.dSYM bundle next to the binary. The bundle
          # contains an unsigned Mach-O DWARF file; if it sits next to the executable when
          # SignTool zips the directory for Apple notarization, the whole submission is
          # rejected with "Archive contains critical validation errors". Move the dSYM into
          # a sibling staging directory so it's preserved as a separate pipeline artifact
          # (useful for symbolicating crash dumps later) but kept out of the notarization zip.
          DSYM_SRC="$PUBLISH_DIR/${{ parameters.rid }}/publish/dotnetup.dSYM"
          DSYM_DEST="$(Build.SourcesDirectory)/artifacts/publish/dotnetup-dsym/${{ parameters.rid }}"
          if [ -d "$DSYM_SRC" ]; then
            mkdir -p "$DSYM_DEST"
            mv "$DSYM_SRC" "$DSYM_DEST/"
            echo "✅ Moved dSYM to $DSYM_DEST"
          else
            echo "⚠️  No dSYM found at $DSYM_SRC"
          fi
        displayName: 🐞 Stage dSYM debug symbols (${{ parameters.rid }})
      - script: |
          ./.dotnet/dotnet restore ./src/Installer/Installer.sign.proj $(_officialBuildProperties)
        displayName: 🍱 Restore signing project (${{ parameters.rid }})
        retryCountOnTaskFailure: 2
      - script: |
          PUBLISH_DIR=$(find "$(Build.SourcesDirectory)/artifacts/bin/dotnetup/Release" -mindepth 1 -maxdepth 1 -type d | head -1)
          DOTNETUP_PUBLISH_DIR="$PUBLISH_DIR/${{ parameters.rid }}/publish/"
          ./.dotnet/dotnet build ./src/Installer/Installer.sign.proj /t:Sign "/p:DotnetupPublishDir=$DOTNETUP_PUBLISH_DIR" /p:TargetOS=osx -bl:$(Build.SourcesDirectory)/artifacts/binlogs/dotnetup-sign-${{ parameters.rid }}.binlog $(_officialBuildProperties)
        displayName: 🖋️ Sign dotnetup executable (${{ parameters.rid }})
        env:
          SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      # Staple the notarization ticket onto the binary itself. Without this, distributing the
      # standalone Mach-O inside a .zip can lose the ticket (which is otherwise stored as an
      # xattr) and Gatekeeper will block execution on first run.
      - script: |
          PUBLISH_DIR=$(find "$(Build.SourcesDirectory)/artifacts/bin/dotnetup/Release" -mindepth 1 -maxdepth 1 -type d | head -1)
          xcrun stapler staple "$PUBLISH_DIR/${{ parameters.rid }}/publish/dotnetup"
          xcrun stapler validate "$PUBLISH_DIR/${{ parameters.rid }}/publish/dotnetup"
        displayName: 📎 Staple notarization ticket (${{ parameters.rid }})
      - script: |
          PUBLISH_DIR=$(find "$(Build.SourcesDirectory)/artifacts/bin/dotnetup/Release" -mindepth 1 -maxdepth 1 -type d | head -1)
          codesign --verify --deep --strict "$PUBLISH_DIR/${{ parameters.rid }}/publish/dotnetup"
          echo "✅ Signature verified for dotnetup"
        displayName: ✅ Verify dotnetup signature (${{ parameters.rid }})

    - ${{ if ne(parameters.pool.os, 'windows') }}:
      - script: |
          PUBLISH_DIR=$(find "$(Build.SourcesDirectory)/artifacts/bin/dotnetup/Release" -mindepth 1 -maxdepth 1 -type d | head -1)
          cp -r "$PUBLISH_DIR/${{ parameters.rid }}/publish/"* "$(Build.SourcesDirectory)/artifacts/publish/dotnetup/${{ parameters.rid }}/"
          mkdir -p "$(Build.SourcesDirectory)/artifacts/publish/dotnetup-standalone/${{ parameters.rid }}"
          cp "$PUBLISH_DIR/${{ parameters.rid }}/publish/dotnetup" "$(Build.SourcesDirectory)/artifacts/publish/dotnetup-standalone/${{ parameters.rid }}/"
        displayName: 📦 Stage dotnetup artifacts (${{ parameters.rid }})
      - script: |
          STANDALONE_DIR="$(Build.SourcesDirectory)/artifacts/publish/dotnetup-standalone/${{ parameters.rid }}"
          HASH=$(sha512sum "$STANDALONE_DIR/dotnetup" | awk '{print $1}')
          printf '%s' "$HASH" > "$STANDALONE_DIR/dotnetup.sha512"
          echo "✅ SHA-512: $HASH"
        displayName: 🔒 Generate SHA-512 checksum (${{ parameters.rid }})
