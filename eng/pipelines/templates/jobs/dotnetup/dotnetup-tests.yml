parameters:
  ### GENERAL ###
  variables: {}
  dependsOn: ''
  helixTargetQueue: ''
  oneESCompat:
    templateFolderName: templates
    publishTaskPrefix: ''
  container: ''
  helixTargetContainer: ''
  categoryName: dotnetup
  runTests: true
  publishRetryConfig: false
  publishXunitResults: false
  enableSbom: true
  timeoutInMinutes: 150

jobs:
- template: /eng/common/${{ parameters.oneESCompat.templateFolderName }}/job/job.yml
  parameters:
    displayName: '${{ parameters.pool.emoji }} dotnetup tests: ${{ parameters.pool.os }} (${{ parameters.helixTargetQueue }})'
    pool: ${{ parameters.pool }}
    container: ${{ parameters.container }}
    strategy: ${{ parameters.strategy }}
    helixRepo: dotnet/sdk
    timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
    enableMicrobuild: true
    enablePublishBuildAssets: true
    enableTelemetry: true
    enablePublishUsingPipelines: true
    enableSbom: ${{ parameters.enableSbom }}
    variables:
    - ${{ insert }}: ${{ parameters.variables }}
    dependsOn: ${{ parameters.dependsOn }}
    preSteps: ${{ parameters.preSteps }}
    templateContext:
      sdl:
        binskim:
          analyzeTargetGlob: +:f|eng\**\*.props;+:f|artifacts\bin\**\*.dll;+:f|artifacts\bin\**\*.exe;-:f|artifacts\bin\**\msdia140.dll;-:f|artifacts\bin\**\pgort140.dll;-:f|artifacts\bin\*Tests\**;-:f|**\Microsoft.NET.Runtime.Emscripten**\tools\**;-:f|**\CodeCoverage\**;-:f|artifacts\bin\**\capstone.dll;
      outputs:
      - output: pipelineArtifact
        displayName: '🌐 Publish Test Artifacts'
        condition: always()
        targetPath: '$(Build.SourcesDirectory)/artifacts/dotnetupTestResults'
        artifactName: 'dotnetupTestResults_${{ parameters.pool.os }}'
        publishLocation: Container

    steps:
    - ${{ if eq(parameters.pool.os, 'windows') }}:
      - powershell: |
          & .\restore.cmd -projects dotnetup.slnf
        displayName: 🍱 Bootstrap toolset (Windows)
        timeoutInMinutes: 10
      - powershell: |
          & .\.dotnet\dotnet restore test\dotnetup.Tests\dotnetup.Tests.csproj
        displayName: ♻️ Restore dotnetup tests (Windows)
      - powershell: |
          & .\.dotnet\dotnet build test\dotnetup.Tests\dotnetup.Tests.csproj -c Release --no-restore -p:TreatWarningsAsErrors=false
        displayName: 💻 Build Windows
      - powershell: |
          & .\.dotnet\dotnet publish src\Installer\dotnetup\dotnetup.csproj -c Release -p:EnforceCodeStyleInBuild=false
        displayName: 🔨 Publish dotnetup AOT (Windows)
      - powershell: |
          $profile = "dotnetup-ci-e2e-$(Build.BuildId)-$(System.JobAttempt)"
          $env:DOTNET_CLI_TELEMETRY_OPTOUT = "0"
          $env:DOTNET_CLI_TELEMETRY_PROFILE = $profile
          $env:TF_BUILD = "true"
          $env:DOTNET_CLI_TELEMETRY_SHUTDOWN_TIMEOUT_MS = "20000"
          $installPath = "$(Agent.TempDirectory)\dotnetup-telemetry-e2e"
          $exe = Get-ChildItem artifacts\bin\dotnetup\Release -Recurse -Filter dotnetup.exe |
              Where-Object FullName -match "\\publish\\dotnetup\.exe$" |
              Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) { throw "Unable to find published dotnetup.exe" }
          & $exe sdk install 0.0.0 --install-path $installPath --no-progress
          if ($LASTEXITCODE -ne 1) { throw "Expected controlled dotnetup failure, got exit code $LASTEXITCODE" }
          $global:LASTEXITCODE = 0
          New-Item -Path "$(Build.SourcesDirectory)\artifacts\dotnetupTestResults" -ItemType Directory -Force | Out-Null
          [ordered]@{
            build_uri = "$(Build.BuildUri)"
            build_id = "$(Build.BuildId)"
            telemetry_profile = $profile
            expected_error = "No product found for version 0.0.0"
            expected_ci_detected = "true"
          } | ConvertTo-Json | Set-Content "$(Build.SourcesDirectory)\artifacts\dotnetupTestResults\telemetry-e2e-probe.json" -Encoding ascii
          Write-Host "dotnetup telemetry profile: $profile"
          Write-Host "dotnetup telemetry build: $(Build.BuildUri)"
        displayName: 📡 Probe CI dotnetup failure telemetry
        condition: and(succeeded(), eq(variables['RunDotnetupTelemetryE2EProbe'], 'true'))
      - powershell: |
          New-Item -Path "$(Build.SourcesDirectory)/artifacts/dotnetupTestResults" -ItemType Directory -Force
        displayName: 📁 Create test results directory (Windows)
      - powershell: |
          $testAssembly = Get-ChildItem -Path "artifacts\bin\dotnetup.Tests\Release" -Recurse -Filter "dotnetup.Tests.dll" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $testAssembly) { throw "Unable to find dotnetup.Tests.dll" }
          & .\.dotnet\dotnet $testAssembly --report-trx --report-trx-filename "dotnetup-tests.trx" --results-directory "$(Build.SourcesDirectory)\artifacts\dotnetupTestResults"
        displayName: 🔍 Test Windows
    - ${{ if ne(parameters.pool.os, 'windows') }}:
      - script: |
          ./restore.sh -projects $(Build.SourcesDirectory)/dotnetup.slnf
        displayName: 🍱 Bootstrap toolset (Unix)
        timeoutInMinutes: 10
      - script: |
          ./.dotnet/dotnet restore test/dotnetup.Tests/dotnetup.Tests.csproj
        displayName: ♻️ Restore dotnetup tests (Unix)
      - script: |
          ./.dotnet/dotnet build test/dotnetup.Tests/dotnetup.Tests.csproj -c Release --no-restore -p:TreatWarningsAsErrors=false
        displayName: 🐧 Build (Unix)
      - script: |
          ./.dotnet/dotnet publish src/Installer/dotnetup/dotnetup.csproj -c Release -p:EnforceCodeStyleInBuild=false
        displayName: 🔨 Publish dotnetup AOT (Unix)
      - script: |
          mkdir -p "$(Build.SourcesDirectory)/artifacts/dotnetupTestResults"
        displayName: 📁 Create test results directory (Unix)
      - script: |
          test_assembly="`find artifacts/bin/dotnetup.Tests/Release -path '*/dotnetup.Tests.dll' -print -quit`"
          if [ -z "$test_assembly" ]; then
            echo "Unable to find dotnetup.Tests.dll"
            exit 1
          fi
          ./.dotnet/dotnet "$test_assembly" --report-trx --report-trx-filename "dotnetup-tests.trx" --results-directory "$(Build.SourcesDirectory)/artifacts/dotnetupTestResults"
        displayName: 🔎 Test (Unix)
    - task: PublishTestResults@2
      displayName: 🚀 Publish test results
      condition: always()
      inputs:
        testResultsFormat: VSTest
        testResultsFiles: '**/dotnetup-tests.trx'
        searchFolder: $(Build.SourcesDirectory)/artifacts/dotnetupTestResults
        testRunTitle: 'dotnetup ${{ parameters.pool.os }}'
