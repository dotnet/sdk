# Pipeline: https://dev.azure.com/dnceng/internal/_build?definitionId=1544

trigger:
  batch: true
  branches:
    include:
    - dnup
    - release/dnup
    - release/dotnetup

pr:
  branches:
    include:
    - dnup
    - release/dnup
    - release/dotnetup

parameters:
# When true, runs the pipeline in the same way as the PR pipeline.
- name: runTestBuild
  displayName: Run A Test Build
  type: boolean
  default: false
- name: enableArm64Job
  displayName: Enables the ARM64 job
  type: boolean
  default: false

variables:
- template: /eng/pipelines/templates/variables/sdk-defaults.yml
# Variables used: DncEngInternalBuildPool
- template: /eng/common/templates-official/variables/pool-providers.yml
# Helix testing requires a token when internally run.
# Variables used: HelixApiAccessToken
- group: DotNet-HelixApi-Access
- group: AzureDevOps-Artifact-Feeds-Pats
# Allows Arcade to run a signed build by disabling post-build signing for release-branch builds or manual builds that are not running tests.
- ${{ if and(eq(parameters.runTestBuild, false), or(startswith(variables['Build.SourceBranch'], 'refs/heads/release/'), startswith(variables['Build.SourceBranch'], 'refs/heads/internal/release/'), eq(variables['Build.Reason'], 'Manual'))) }}:
  - name: PostBuildSign
    value: false
# Provides TSA variables for automatic bug reporting.
- ${{ if ne(variables['Build.Reason'], 'PullRequest') }}:
  - group: DotNet-CLI-SDLValidation-Params
### LOCAL ONLY ###
- name: _publishArgument
  value: -publish
- name: _signArgument
  value: -sign /p:SignCoreSdk=true
- name: _TeamName
  value: DotNet-Cli
# MicroBuildSigningPlugin@4 on non-Windows agents requires a pipeline variable
# literally named TeamName (separate from arcade's _TeamName convention).
- name: TeamName
  value: DotNet-Cli
- name: _BuildConfig
  value: Release
- name: _officialBuildProperties
  # The OfficialBuilder property is set to Microsoft for the official build only.
  # This property is checked in Directory.Build.props and adds the MICROSOFT_ENABLE_TELEMETRY constant.
  # This constant is used in CompileOptions.cs to set both TelemetryOptOutDefault and TelemetryOptOutDefaultString.
  value: /p:DotNetPublishUsingPipelines=true /p:OfficialBuilder=Microsoft /p:OfficialBuildId=$(Build.BuildNumber)
- name: _SignType
  value: real

resources:
  repositories:
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  ${{ if ne(variables['Build.Reason'], 'PullRequest') }}:
    template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  ${{ else }}:
    template: v1/1ES.Unofficial.PipelineTemplate.yml@1esPipelines
  parameters:
    containers:
      azureLinux30Amd64:
        image: mcr.microsoft.com/dotnet-buildtools/prereqs:azurelinux-3.0-net10.0-build-amd64
      # Cross-build containers for NAOT executables (link against older glibc/musl sysroots).
      # See: https://github.com/dotnet/runtime/blob/main/docs/workflow/using-docker.md
      crossBuildLinuxX64:
        image: mcr.microsoft.com/dotnet-buildtools/prereqs:azurelinux-3.0-net10.0-cross-amd64
        env:
          ROOTFS_DIR: /crossrootfs/x64
      crossBuildLinuxArm64:
        image: mcr.microsoft.com/dotnet-buildtools/prereqs:azurelinux-3.0-net10.0-cross-arm64
        env:
          ROOTFS_DIR: /crossrootfs/arm64
      crossBuildMuslX64:
        image: mcr.microsoft.com/dotnet-buildtools/prereqs:azurelinux-3.0-net10.0-cross-amd64-musl
        env:
          ROOTFS_DIR: /crossrootfs/x64
      crossBuildMuslArm64:
        image: mcr.microsoft.com/dotnet-buildtools/prereqs:azurelinux-3.0-net10.0-cross-arm64-musl
        env:
          ROOTFS_DIR: /crossrootfs/arm64

    sdl:
      sourceAnalysisPool:
        name: $(DncEngInternalBuildPool)
        image: 1es-windows-2022
        os: windows
      policheck:
        enabled: true
      tsa:
        enabled: true
      binskim:
        enabled: true
      ${{ if or(eq(parameters.runTestBuild, true), eq(variables['Build.Reason'], 'PullRequest')) }}:
        componentgovernance:
          # Refdoc: https://docs.opensource.microsoft.com/tools/cg/component-detection/variables/
          ignoreDirectories: artifacts, .packages

    stages:
      - stage: style_check
        displayName: 📏 Style check
        jobs:
        - template: /eng/common/templates-official/job/job.yml@self
          parameters:
            displayName: '📏 dotnetup style check'
            pool:
              name: $(DncEngInternalBuildPool)
              image: 1es-windows-2022
              os: windows
            helixRepo: dotnet/sdk
            timeoutInMinutes: 15
            enableMicrobuild: false
            enablePublishBuildAssets: false
            enableTelemetry: true
            enableSbom: false
            steps:
            - powershell: |
                & .\restore.cmd
              displayName: 🍱 Bootstrap toolset
            - powershell: |
                & .\.dotnet\dotnet restore test\dotnetup.Tests\dotnetup.Tests.csproj
              displayName: ♻️ Restore
            - powershell: |
                $failed = $false
                & .\.dotnet\dotnet build src\Installer\Microsoft.Dotnet.Installation\Microsoft.Dotnet.Installation.csproj -warnaserror --no-restore /p:EnforceCodeStyleInBuild=true /p:CodeAnalysisTreatWarningsAsErrors=true
                if ($LASTEXITCODE -ne 0) { $failed = $true }
                & .\.dotnet\dotnet build src\Installer\dotnetup.Library\dotnetup.Library.csproj -warnaserror --no-restore /p:EnforceCodeStyleInBuild=true /p:CodeAnalysisTreatWarningsAsErrors=true
                if ($LASTEXITCODE -ne 0) { $failed = $true }
                & .\.dotnet\dotnet build test\dotnetup.Tests\dotnetup.Tests.csproj -warnaserror --no-restore /p:EnforceCodeStyleInBuild=true /p:CodeAnalysisTreatWarningsAsErrors=true
                if ($LASTEXITCODE -ne 0) { $failed = $true }
                if ($failed) { Write-Error 'One or more projects have warnings. Fix all warnings to pass this check.'; exit 1 }
              displayName: 🔨 Build with -warnaserror

      - stage: tests
        displayName: 🧪 dotnetup tests
        dependsOn: []
        jobs:
        ### Windows ###
        - template: /eng/pipelines/templates/jobs/dotnetup/dotnetup-tests.yml@self
          parameters:
            pool:
              name: $(DncEngInternalBuildPool)
              image: windows.vs2022.amd64
              os: windows
              emoji: 🪟
            helixTargetQueue: windows.amd64.vs2022.pre
            oneESCompat:
              templateFolderName: templates-official
              publishTaskPrefix: 1ES.
            runtimeSourceProperties: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)
            populateInternalRuntimeVariables: true
            # WORKAROUND: BinSkim requires the folder exist prior to scanning.
            preSteps:
            - powershell: New-Item -ItemType Directory -Path $(Build.SourcesDirectory)/artifacts/bin -Force
              displayName: Create artifacts/bin directory
            ${{ if and(eq(parameters.runTestBuild, false), ne(variables['Build.Reason'], 'PullRequest')) }}:
              timeoutInMinutes: 180
              windowsJobParameterSets:
              ### OFFICIAL ###
              - categoryName: Official
                publishArgument: $(_publishArgument)
                signArgument: $(_signArgument)
                officialBuildProperties: $(_officialBuildProperties) /p:BuildWorkloads=true
                enableDefaultArtifacts: true
                runTests: false
                publishRetryConfig: true
                variables:
                  _SignType: real
      ############### BUILD / PACK / SIGN / PUBLISH ###############
      # Standard Arcade flow.  Set projectsArgument to only build dotnetup, not the whole SDK.
      - stage: build_dotnetup
        displayName: 🛠️ Build dotnetup
        dependsOn: []
        jobs:
        ############### WINDOWS ###############
        - template: /eng/pipelines/templates/jobs/sdk-job-matrix.yml@self
          parameters:
            pool:
              name: $(DncEngInternalBuildPool)
              image: windows.vs2022.amd64
              os: windows
            oneESCompat:
              templateFolderName: templates-official
              publishTaskPrefix: 1ES.
            runtimeSourceProperties: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)
            populateInternalRuntimeVariables: true
            preSteps:
            - powershell: New-Item -ItemType Directory -Path $(Build.SourcesDirectory)/artifacts/bin -Force
              displayName: Create artifacts/bin directory
            timeoutInMinutes: 90
            windowsJobParameterSets:
            - categoryName: Dotnetup
              targetArchitecture: x64
              publishArgument: $(_publishArgument)
              signArgument: $(_signArgument)
              officialBuildProperties: $(_officialBuildProperties) /p:PublishBinariesAndBadge=false
              projectsArgument: /p:Projects=$(Build.SourcesDirectory)/dotnetup.slnf
              enableDefaultArtifacts: true
              runTests: false
              variables:
                _SignType: real
            - categoryName: Dotnetup
              targetArchitecture: arm64
              publishArgument: $(_publishArgument)
              signArgument: $(_signArgument)
              officialBuildProperties: $(_officialBuildProperties) /p:PublishBinariesAndBadge=false
              projectsArgument: /p:Projects=$(Build.SourcesDirectory)/dotnetup.slnf
              enableDefaultArtifacts: true
              runTests: false
              variables:
                _SignType: real

        ############### LINUX ###############
        - template: /eng/pipelines/templates/jobs/sdk-job-matrix.yml@self
          parameters:
            pool:
              name: $(DncEngInternalBuildPool)
              image: 1es-ubuntu-2204
              os: linux
            oneESCompat:
              templateFolderName: templates-official
              publishTaskPrefix: 1ES.
            runtimeSourceProperties: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)
            populateInternalRuntimeVariables: true
            timeoutInMinutes: 90
            linuxJobParameterSets:
            # Cross-build containers set ROOTFS_DIR; pass /p:SysRoot and /p:LinkerFlavor=lld
            # via osProperties so the NativeAOT linker targets the correct sysroot for the RID.
            - categoryName: Dotnetup
              container: crossBuildLinuxX64
              targetArchitecture: x64
              runtimeIdentifier: linux-x64
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties) /p:PublishBinariesAndBadge=false
              projectsArgument: /p:Projects=$(Build.SourcesDirectory)/dotnetup.slnf
              osProperties: /p:SysRoot=$ROOTFS_DIR /p:LinkerFlavor=lld
              enableDefaultArtifacts: true
              runTests: false
            - categoryName: Dotnetup
              container: crossBuildLinuxArm64
              targetArchitecture: arm64
              runtimeIdentifier: linux-arm64
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties) /p:PublishBinariesAndBadge=false
              projectsArgument: /p:Projects=$(Build.SourcesDirectory)/dotnetup.slnf
              osProperties: /p:SysRoot=$ROOTFS_DIR /p:LinkerFlavor=lld
              enableDefaultArtifacts: true
              runTests: false
            - categoryName: Dotnetup
              container: crossBuildMuslX64
              targetArchitecture: x64
              runtimeIdentifier: linux-musl-x64
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties) /p:PublishBinariesAndBadge=false
              projectsArgument: /p:Projects=$(Build.SourcesDirectory)/dotnetup.slnf
              osProperties: /p:SysRoot=$ROOTFS_DIR /p:LinkerFlavor=lld /p:OSName=linux-musl
              enableDefaultArtifacts: true
              enableSbom: false
              runTests: false
            - categoryName: Dotnetup
              container: crossBuildMuslArm64
              targetArchitecture: arm64
              runtimeIdentifier: linux-musl-arm64
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties) /p:PublishBinariesAndBadge=false
              projectsArgument: /p:Projects=$(Build.SourcesDirectory)/dotnetup.slnf
              osProperties: /p:SysRoot=$ROOTFS_DIR /p:LinkerFlavor=lld /p:OSName=linux-musl
              enableDefaultArtifacts: true
              enableSbom: false
              runTests: false

        ############### MACOS ###############
        - template: /eng/pipelines/templates/jobs/sdk-job-matrix.yml@self
          parameters:
            pool:
              name: Azure Pipelines
              image: macOS-latest
              os: macOS
            oneESCompat:
              templateFolderName: templates-official
              publishTaskPrefix: 1ES.
            runtimeSourceProperties: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)
            populateInternalRuntimeVariables: true
            timeoutInMinutes: 90
            macOSJobParameterSets:
            - categoryName: Dotnetup
              targetArchitecture: x64
              runtimeIdentifier: osx-x64
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties) /p:PublishBinariesAndBadge=false
              projectsArgument: /p:Projects=$(Build.SourcesDirectory)/dotnetup.slnf
              enableDefaultArtifacts: true
              runTests: false
            - categoryName: Dotnetup
              targetArchitecture: arm64
              runtimeIdentifier: osx-arm64
              publishArgument: $(_publishArgument)
              officialBuildProperties: $(_officialBuildProperties) /p:PublishBinariesAndBadge=false
              projectsArgument: /p:Projects=$(Build.SourcesDirectory)/dotnetup.slnf
              enableDefaultArtifacts: true
              runTests: false

      ############### PUBLISH STAGE ###############
      - stage: publish
        displayName: 📤 Publish to BAR
        dependsOn:
        - build_dotnetup
        jobs:
        - template: /eng/common/templates-official/job/publish-build-assets.yml@self
          parameters:
            publishUsingPipelines: true
            publishAssetsImmediately: true
            isAssetlessBuild: true
            repositoryAlias: self
            pool:
              name: $(DncEngInternalBuildPool)
              image: 1es-windows-2022
              os: windows