# Pipeline: https://dev.azure.com/dnceng-public/public/_build?definitionId=323

trigger: none

pr:
  branches:
    include:
    - dnup
    - release/dnup
    - release/dotnetup

parameters:
- name: enableArm64Job
  displayName: Enables the ARM64 job
  type: boolean
  default: true

variables:
- template: /eng/pipelines/templates/variables/sdk-defaults.yml
  # Variables used: DncEngPublicBuildPool
- template: /eng/common/templates/variables/pool-providers.yml

stages:
- stage: dotnetup
  displayName: 🏰 dotnetup tests
  jobs:
  ############### STYLE CHECK ###############
  - template: /eng/common/templates/job/job.yml
    parameters:
      displayName: '📏 dotnetup style check'
      pool:
        name: $(DncEngPublicBuildPool)
        demands: ImageOverride -equals windows.vs2022.amd64.open
        os: windows
      helixRepo: dotnet/sdk
      timeoutInMinutes: 15
      enableMicrobuild: false
      enablePublishBuildAssets: false
      enableTelemetry: true
      enableSbom: false
      steps:
      - powershell: |
          & .\restore.cmd
        displayName: 🍱 Bootstrap toolset
      - powershell: |
          & .\.dotnet\dotnet restore test\dotnetup.Tests\dotnetup.Tests.csproj
        displayName: ♻️ Restore
      - powershell: |
          $failed = $false
          & .\.dotnet\dotnet build src\Installer\Microsoft.Dotnet.Installation\Microsoft.Dotnet.Installation.csproj -warnaserror --no-restore
          if ($LASTEXITCODE -ne 0) { $failed = $true }
          & .\.dotnet\dotnet build src\Installer\dotnetup\dotnetup.csproj -warnaserror --no-restore
          if ($LASTEXITCODE -ne 0) { $failed = $true }
          & .\.dotnet\dotnet build test\dotnetup.Tests\dotnetup.Tests.csproj -warnaserror --no-restore
          if ($LASTEXITCODE -ne 0) { $failed = $true }
          if ($failed) { Write-Error 'One or more projects have warnings. Fix all warnings to pass this check.'; exit 1 }
        displayName: 🔨 Build with -warnaserror

  ############### WINDOWS ###############
  - template: /eng/pipelines/templates/jobs/dotnetup/dotnetup-tests.yml@self
    parameters:
      pool:
        name: $(DncEngPublicBuildPool)
        demands: ImageOverride -equals windows.vs2022.amd64.open
        os: windows
        emoji: 🪟
      helixTargetQueue: windows.amd64.vs2022.pre.open

  ############### LINUX ###############
  - template: /eng/pipelines/templates/jobs/dotnetup/dotnetup-tests.yml@self
    parameters:
      pool:
        name: $(DncEngPublicBuildPool)
        demands: ImageOverride -equals build.ubuntu.2204.amd64.open
        os: linux
        emoji: 🐧
      helixTargetQueue: ubuntu.2204.amd64.open

  ############### MACOS ###############
  - template: /eng/pipelines/templates/jobs/dotnetup/dotnetup-tests.yml@self
    parameters:
      pool:
        name: Azure Pipelines
        vmImage: macOS-latest
        os: macOS
        emoji: 🍎
      helixTargetQueue: osx.15.amd64.open

  ### ARM64 ###
  - ${{ if eq(parameters.enableArm64Job, true) }}:
    - template: /eng/pipelines/templates/jobs/dotnetup/dotnetup-tests.yml@self
      parameters:
        pool:
          name: Azure Pipelines
          vmImage: macOS-latest
          os: macOS
          emoji: 💪
        helixTargetQueue: osx.13.arm64.open


