name: 🆙 dotnetup issue
description: Report a bug or request a feature for dotnetup
labels: ["dotnetup", "untriaged"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for issues with **dotnetup**.

        For general dotnetup questions or suggestions, post in [dotnetup discussions](https://github.com/dotnet/sdk/discussions/categories/dotnetup).

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have read the [dotnetup documentation](https://github.com/dotnet/sdk/tree/release/dnup/documentation/general/dotnetup).
          required: true
        - label: I have searched for [existing dotnetup issues](https://github.com/dotnet/sdk/issues?q=is%3Aissue%20state%3Aopen%20label%3Adotnetup).
          required: true
        - label: I have searched for [existing dotnetup discussions](https://github.com/dotnet/sdk/discussions/categories/dotnetup).
          required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue type
      description: Is this a bug report or a feature request?
      options:
        - Bug report
        - Feature request
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug or the feature you'd like. For bugs, include steps to reproduce and information about your environment.
      placeholder: What's going on?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: dotnetup version
      description: Which version of dotnetup are you using?
      placeholder: output from `dotnetup --version`
    validations:
      required: false
