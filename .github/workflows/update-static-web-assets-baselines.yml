name: Update Static Web Assets Baselines

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number'
        required: true
        type: string

permissions:
  contents: read

jobs:
  metadata:
    name: Fetch Pull Request Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      pr_number: ${{ steps.info.outputs.pr_number }}
      head_ref: ${{ steps.info.outputs.head_ref }}
    steps:
      - name: Load pull request details
        id: info
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            if (!Number.isInteger(prNumber)) {
              core.setFailed(`Invalid PR number: ${process.env.PR_NUMBER}`);
              return;
            }

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (pr.data.state !== 'open') {
              core.setFailed(`Pull request #${prNumber} is not open.`);
              return;
            }

            // Commits cannot be applied to a pull request whose head branch lives in a fork. Detect that and explain how to proceed.
            const baseRepo = `${context.repo.owner}/${context.repo.repo}`;
            const headRepo = pr.data.head.repo ? pr.data.head.repo.full_name : null;
            if (headRepo !== baseRepo) {
              const body = [
                `❌ The baseline update can't run on this pull request because its head branch lives in a fork`,
                `(\`${headRepo || 'a deleted fork'}\`), not in \`${baseRepo}\`.`,
                ``,
                `The GitHub Actions runner can only push to \`${baseRepo}\`; it has no access to push commits to your fork.`,
                `To use this, push your branch directly to the \`${baseRepo}\` remote and open the pull request from that`,
                `branch (based off \`${baseRepo}\`), then re-run this workflow.`,
              ].join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.setFailed(`Pull request head branch is in a fork (${headRepo || 'deleted'}); the runner cannot push to it.`);
              return;
            }

            core.setOutput('pr_number', String(pr.data.number));
            core.setOutput('head_ref', pr.data.head.ref);

  generate:
    name: Generate Baseline Updates
    needs: metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      changes: ${{ steps.check.outputs.changes }}
      diff_summary: ${{ steps.package.outputs.diff_summary }}
    defaults:
      run:
        working-directory: pr
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          ref: refs/pull/${{ needs.metadata.outputs.pr_number }}/head
          path: pr
          persist-credentials: false

      - name: Run build script
        id: build
        run: |
          chmod +x ./build.sh
          ./build.sh -c Release
        continue-on-error: true
        env:
          GITHUB_TOKEN: ""
          GH_TOKEN: ""

      - name: Update baselines
        id: update
        if: steps.build.outcome == 'success'
        run: |
          chmod +x src/RazorSdk/update-test-baselines.sh
          export DOTNET_ROOT="$(pwd)/.dotnet"
          export PATH="$DOTNET_ROOT:$PATH"
          src/RazorSdk/update-test-baselines.sh
        continue-on-error: true
        env:
          GITHUB_TOKEN: ""
          GH_TOKEN: ""

      - name: Check for baseline changes
        id: check
        if: steps.update.outcome == 'success'
        run: |
          set -euo pipefail
          shopt -s globstar

          mapfile -t changed_files < <(git diff --name-only)
          if [ ${#changed_files[@]} -eq 0 ]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for file in "${changed_files[@]}"; do
            if [[ "$file" != test/**/*.json ]]; then
              echo "Unexpected file changed: $file" >&2
              exit 1
            fi
          done

          printf '%s\n' "${changed_files[@]}" > __changed-files.txt
          echo "changes=true" >> "$GITHUB_OUTPUT"

      - name: Evaluate generation result
        id: evaluate
        if: always()
        run: |
          status="success"
          reason=""

          if [ "${BUILD_OUTCOME}" != "success" ]; then
            status="failed"
            reason="build"
          elif [ "${UPDATE_OUTCOME}" != "success" ]; then
            status="failed"
            reason="update"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ -n "$reason" ]; then
            echo "failure_reason=$reason" >> "$GITHUB_OUTPUT"
          fi
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          UPDATE_OUTCOME: ${{ steps.update.outcome }}

      - name: Package baseline artifacts
        id: package
        if: steps.evaluate.outputs.status == 'success' && steps.check.outputs.changes == 'true'
        run: |
          mkdir -p __artifacts
          # __changed-files.txt is only used to build the tarball; it is intentionally not included in the
          # uploaded artifact because the 'apply' job derives the file list from the extracted tree, not this file.
          git diff --stat -- test/ > __artifacts/diff-summary.txt
          tar -czf __artifacts/baselines.tar.gz -T __changed-files.txt
          printf 'diff_summary<<EOF\n%s\nEOF\n' "$(cat __artifacts/diff-summary.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload baseline artifacts
        if: steps.evaluate.outputs.status == 'success' && steps.check.outputs.changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: static-web-assets-baselines
          path: pr/__artifacts
          if-no-files-found: error

      - name: Create failure diagnostics
        if: steps.evaluate.outputs.status == 'failed'
        run: |
          mkdir -p __failure
          if [ -n "${{ steps.evaluate.outputs.failure_reason }}" ]; then
            echo "${{ steps.evaluate.outputs.failure_reason }}" > __failure/failure_reason.txt
          else
            echo "unknown" > __failure/failure_reason.txt
          fi

      - name: Upload failure diagnostics
        if: steps.evaluate.outputs.status == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: static-web-assets-baselines-failure
          path: pr/__failure
          if-no-files-found: ignore

      - name: Fail job when generation unsuccessful
        if: steps.evaluate.outputs.status == 'failed'
        run: |
          echo "Baseline generation failed."
          exit 1

  apply:
    name: Apply Baseline Updates
    needs: [metadata, generate]
    if: needs.generate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          # Check out the PR head commit by pull-request ref (mirrors the generate job). The branch NAME
          # (head_ref) is only resolvable for same-repo PRs; refs/pull/<n>/head resolves for any open PR, so
          # the checkout no longer fails on fork PRs or when the head branch was renamed/deleted.
          ref: refs/pull/${{ needs.metadata.outputs.pr_number }}/head
          persist-credentials: false

      - name: Download baseline artifacts
        if: needs.generate.outputs.changes == 'true'
        uses: actions/download-artifact@v4
        with:
          name: static-web-assets-baselines
          path: artifact

      - name: Checkout trusted validation script
        if: needs.generate.outputs.changes == 'true'
        uses: actions/checkout@v6
        with:
          # Always use the canonical validator from the repository's default branch (main), never the PR's copy and
          # never a release branch's copy when this workflow is dispatched from one.
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          path: _validator
          sparse-checkout: |
            .github/scripts/validate-change-archive.py
          sparse-checkout-cone-mode: false

      - name: Validate and stage baseline files
        if: needs.generate.outputs.changes == 'true'
        run: |
          set -euo pipefail

          # The artifact comes from the untrusted 'generate' job. Validate and extract it with the shared script
          # checked out separately above from the trusted default branch (never the PR's copy), then stage only
          # the repository-relative paths it approves.
          if ! python3 _validator/.github/scripts/validate-change-archive.py \
              --archive artifact/baselines.tar.gz \
              --dest . \
              --scope test \
              --ext .json \
              > __staged-files.nul; then
            echo "Artifact validation failed." >&2
            exit 1
          fi

          mapfile -d '' -t staged_files < __staged-files.nul
          rm -f __staged-files.nul
          if [ ${#staged_files[@]} -eq 0 ]; then
            echo "No baseline files were present in the artifact." >&2
            exit 1
          fi
          git add -- "${staged_files[@]}"

      - name: Prepare commit message
        id: commit-message
        if: needs.generate.outputs.changes == 'true'
        shell: bash
        run: |
          COMMIT_DATE=$(date -u +"%Y-%m-%d")
          printf 'message=[Infrastructure] Update baselines %s\n' "$COMMIT_DATE" >> "$GITHUB_OUTPUT"

      - name: Commit baseline changes
        id: commit
        if: needs.generate.outputs.changes == 'true'
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ steps.commit-message.outputs.message }}
          ALLOWED_PATTERNS: |
            test/**/*.json
          GIT_USER_NAME: github-actions[bot]
          GIT_USER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          shopt -s globstar

          git config user.name "${GIT_USER_NAME}"
          git config user.email "${GIT_USER_EMAIL}"

          mapfile -t staged_files < <(git diff --cached --name-only)
          if [ ${#staged_files[@]} -eq 0 ]; then
            echo "No staged files were found. Nothing to commit." >&2
            exit 1
          fi

          if [ -z "${ALLOWED_PATTERNS//,/ }" ]; then
            echo "No allowed patterns were provided." >&2
            exit 1
          fi

          patterns_normalised=$(printf '%s' "${ALLOWED_PATTERNS}" | tr ',' '\n')
          mapfile -t allowed_patterns < <(printf '%s\n' "${patterns_normalised}" | sed -e 's/^\s*//' -e 's/\s*$//' | sed -e '/^$/d')

          if [ ${#allowed_patterns[@]} -eq 0 ]; then
            echo "Allowed pattern list is empty after normalisation." >&2
            exit 1
          fi

          for file in "${staged_files[@]}"; do
            match=false
            for pattern in "${allowed_patterns[@]}"; do
              if [[ "$file" == $pattern ]]; then
                match=true
                break
              fi
            done

            if [ "$match" = false ]; then
              echo "File '$file' does not match the allowed patterns." >&2
              exit 1
            fi
          done

          # Defense in depth: disable hooks and gitattributes-driven filters so a
          # commit can never execute repository- or artifact-supplied code, even
          # if an unexpected file slipped into .git/ earlier.
          git -c core.hooksPath=/dev/null -c core.attributesFile=/dev/null commit -m "${COMMIT_MESSAGE}"

      - name: Push baseline changes
        if: steps.commit.outcome == 'success'
        run: |
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" HEAD:${{ needs.metadata.outputs.head_ref }}

      - name: Comment on PR - Success
        if: steps.commit.outcome == 'success'
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: |
            ✅ Static web assets baselines were updated and pushed to this pull request. Review [the workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          ISSUE_NUMBER: ${{ needs.metadata.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: process.env.COMMENT_BODY,
            });

      - name: Comment on PR - No changes
        if: needs.generate.outputs.changes != 'true'
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: |
            ℹ️ No static web assets baselines needed updating. Review [the workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          ISSUE_NUMBER: ${{ needs.metadata.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: process.env.COMMENT_BODY,
            });

  report-failure:
    name: Report Failure
    needs: [metadata, generate, apply]
    if: needs.metadata.result == 'success' && failure()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download failure diagnostics
        uses: actions/download-artifact@v4
        with:
          name: static-web-assets-baselines-failure
          path: diagnostics
        continue-on-error: true

      - name: Prepare failure comment
        id: failure-comment
        shell: bash
        env:
          GENERATE_RESULT: ${{ needs.generate.result }}
          APPLY_RESULT: ${{ needs.apply.result }}
        run: |
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          reason=""
          if [ -f diagnostics/failure_reason.txt ]; then
            reason=$(tr -d '\r' < diagnostics/failure_reason.txt | tr -d '\000')
          fi

          message="❌ Failed to update static web assets baselines."
          if [ "${GENERATE_RESULT}" = "failure" ]; then
            case "$reason" in
              build)
                message="$message The build failed."
                ;;
              update)
                message="$message The baseline update script failed."
                ;;
            esac
          elif [ "${APPLY_RESULT}" = "failure" ]; then
            message="$message Applying or pushing the baseline changes failed."
          fi

          message="$message Please check [the workflow run](${run_url}) for details."
          printf 'body<<EOF\n%s\nEOF\n' "$message" >> "$GITHUB_OUTPUT"

      - name: Comment on PR - Failure
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.failure-comment.outputs.body }}
          ISSUE_NUMBER: ${{ needs.metadata.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: process.env.COMMENT_BODY,
            });
